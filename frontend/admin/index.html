<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMEDK Official CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <!-- ========== Login Page ========== -->
  <div id="login-page" class="admin-login-page">
    <div class="admin-login-card">
      <div class="login-logo">COMEDK<span class="logo-highlight">Official</span></div>
      <p class="login-subtitle">CRM Dashboard &mdash; Sign in to continue</p>

      <div id="login-error" style="display:none; background:#fdeaea; color:#e74c3c; padding:10px 14px; border-radius:8px; font-size:0.8125rem; margin-bottom:16px; text-align:left;"></div>

      <form id="login-form" class="admin-form" onsubmit="return false;">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div class="login-options">
          <label><input type="checkbox" id="login-remember"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ========== Dashboard App Shell ========== -->
  <div id="app" class="admin-layout" style="display:none;">

    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">COMEDK<span class="logo-highlight">Official</span></div>
        <button class="sidebar-toggle" id="sidebar-toggle-btn" title="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav-section">
          <div class="sidebar-nav-label">Main</div>

          <a href="#/dashboard" class="sidebar-link active" data-route="/dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
          </a>

          <a href="#/leads" class="sidebar-link" data-route="/leads">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Leads</span>
          </a>

          <a href="#/pipeline" class="sidebar-link" data-route="/pipeline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="6" height="18" rx="1"/><rect x="9" y="6" width="6" height="15" rx="1"/><rect x="17" y="9" width="6" height="12" rx="1"/></svg>
            <span>Pipeline</span>
          </a>

          <a href="#/reminders" class="sidebar-link" data-route="/reminders">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>Reminders</span>
            <span class="sidebar-badge" id="reminder-badge" style="display:none;">0</span>
          </a>
        </div>

        <div class="sidebar-nav-section">
          <div class="sidebar-nav-label">Admin</div>

          <a href="#/team" class="sidebar-link" data-route="/team" id="nav-team">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            <span>Team</span>
          </a>

          <a href="#/settings" class="sidebar-link" data-route="/settings" id="nav-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Settings</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="sidebar-avatar">--</div>
          <div class="sidebar-user-info">
            <div class="name" id="sidebar-user-name">User</div>
            <div class="role" id="sidebar-user-role">Role</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">

      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="topbar-left">
          <button class="topbar-mobile-toggle" id="mobile-menu-btn" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title" id="page-title">Dashboard</h1>
        </div>

        <div class="topbar-right">
          <div class="topbar-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="global-search" placeholder="Search leads...">
          </div>

          <button class="topbar-icon-btn" id="notif-btn" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot" id="notif-dot" style="display:none;"></span>
          </button>

          <div class="topbar-user" id="topbar-user-menu">
            <div class="topbar-user-avatar" id="topbar-avatar">--</div>
            <span class="topbar-user-name" id="topbar-user-name">User</span>
          </div>

          <button class="topbar-icon-btn" id="logout-btn" title="Sign Out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <!-- Dynamic Content Area -->
      <div id="content" class="admin-content">
        <!-- Rendered by JS router -->
      </div>

    </main>
  </div>

  <!-- ========== Lead Detail Modal ========== -->
  <div id="lead-modal" class="modal-overlay">
    <div class="modal" style="max-width:720px;">
      <div class="modal-header">
        <h2 id="modal-lead-name">Lead Details</h2>
        <button class="modal-close" id="modal-close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Tabs -->
      <div style="display:flex; border-bottom:1px solid var(--border-light); padding:0 24px;">
        <button class="modal-tab active" data-tab="info" style="padding:12px 16px; font-size:0.8125rem; font-weight:600; border:none; background:none; cursor:pointer; border-bottom:2px solid var(--primary); color:var(--primary);">Info</button>
        <button class="modal-tab" data-tab="notes" style="padding:12px 16px; font-size:0.8125rem; font-weight:600; border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; color:var(--text-muted);">Activity</button>
        <button class="modal-tab" data-tab="reminders" style="padding:12px 16px; font-size:0.8125rem; font-weight:600; border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; color:var(--text-muted);">Reminders</button>
      </div>

      <div class="modal-body" id="modal-body">
        <!-- Tab content rendered dynamically -->
      </div>
    </div>
  </div>

  <!-- ========== Add Lead Modal ========== -->
  <div id="add-lead-modal" class="modal-overlay">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <h2>Add New Lead</h2>
        <button class="modal-close" id="add-lead-close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="add-lead-form" class="admin-form" onsubmit="return false;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
              <label for="new-lead-name">Full Name *</label>
              <input type="text" id="new-lead-name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label for="new-lead-phone">Phone *</label>
              <input type="tel" id="new-lead-phone" class="form-control" required placeholder="+91 98765 43210">
            </div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
              <label for="new-lead-email">Email</label>
              <input type="email" id="new-lead-email" class="form-control" placeholder="john@example.com">
            </div>
            <div class="form-group">
              <label for="new-lead-exam">Exam</label>
              <input type="text" id="new-lead-exam" class="form-control" placeholder="NEET / JEE / CAT">
            </div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
              <label for="new-lead-source">Source</label>
              <select id="new-lead-source" class="form-control">
                <option value="">Select source</option>
                <option value="predictor">Predictor</option>
                <option value="website">Website</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="referral">Referral</option>
                <option value="walk-in">Walk-in</option>
                <option value="phone">Phone</option>
              </select>
            </div>
            <div class="form-group">
              <label for="new-lead-priority">Priority</label>
              <select id="new-lead-priority" class="form-control">
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="new-lead-notes">Initial Notes</label>
            <textarea id="new-lead-notes" class="form-control" rows="3" placeholder="Any initial notes about this lead..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" id="add-lead-cancel-btn">Cancel</button>
        <button class="btn btn-primary btn-sm" id="add-lead-submit-btn">Add Lead</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/leads.js"></script>
  <script src="../js/admin/pipeline.js"></script>
  <script src="../js/admin/analytics.js"></script>
  <script src="../js/admin/detail.js"></script>
  <script src="../js/admin/app.js"></script>
</body>
</html>
